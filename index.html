<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#1099d6" />
<title>Pool Party Dance-Off</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #061018;
    font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
    touch-action: none; user-select: none; -webkit-user-select: none;
  }
  #wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #stage { position: relative; line-height: 0; }
  canvas { display: block; touch-action: none; }
  .iconbtn {
    position: absolute; top: 8px; left: 8px; z-index: 12;
    width: 38px; height: 38px; border-radius: 50%;
    border: none; cursor: pointer; font-size: 18px; line-height: 1;
    color: #fff; background: rgba(6,16,24,0.38);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(2px); pointer-events: auto;
  }
  .iconbtn:active { transform: scale(0.92); }
  /* Overlays */
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; color: #fff; z-index: 10;
    padding: 24px; gap: 18px;
    background: radial-gradient(120% 80% at 50% 0%, rgba(255,120,180,0.25), rgba(6,16,24,0.78) 70%);
    backdrop-filter: blur(2px);
  }
  .hidden { display: none !important; }
  h1 {
    font-size: clamp(30px, 9vw, 56px); line-height: 1.0; font-weight: 900;
    letter-spacing: 1px;
    background: linear-gradient(180deg,#fff,#ffd6ec 45%,#ff5fa8);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 4px 24px rgba(255,95,168,0.5);
    transform: rotate(-3deg);
  }
  .tag { font-size: clamp(13px,4vw,18px); opacity: .9; font-weight: 600; letter-spacing:.5px;}
  .btn {
    pointer-events: auto; cursor: pointer;
    font-size: clamp(18px,6vw,26px); font-weight: 900;
    color: #2a0a18;
    padding: 16px 40px; border: none; border-radius: 999px;
    background: linear-gradient(180deg,#fff3,#fff0), linear-gradient(180deg,#ffd34d,#ff7ac0);
    box-shadow: 0 8px 0 #c2386f, 0 14px 30px rgba(0,0,0,.45);
    transform: translateY(0); transition: transform .06s, box-shadow .06s;
  }
  .btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #c2386f, 0 6px 16px rgba(0,0,0,.45); }
  .btn2 {
    background: linear-gradient(180deg,#fff3,#fff0), linear-gradient(180deg,#7fe0ff,#5fa8ff);
    color: #08263a; box-shadow: 0 8px 0 #2f6f9c, 0 14px 30px rgba(0,0,0,.45);
  }
  .btn2:active { transform: translateY(6px); box-shadow: 0 2px 0 #2f6f9c, 0 6px 16px rgba(0,0,0,.45); }
  .how {
    font-size: clamp(12px,3.6vw,15px); opacity:.85; max-width: 320px; line-height:1.5;
    background: rgba(0,0,0,.28); padding:14px 18px; border-radius:16px;
  }
  .big { font-size: clamp(40px,13vw,72px); font-weight:900; margin:4px 0; }
  .small { font-size: clamp(13px,4vw,17px); opacity:.85; }
  .credit { position:absolute; bottom:10px; font-size:11px; opacity:.5; }
  .pulse { animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game"></canvas>
    <button id="muteBtn" class="iconbtn" aria-label="Toggle sound">🔊</button>
  </div>

  <!-- TITLE -->
  <div id="title" class="screen">
    <div class="tag">🌴 LAS VEGAS POOL CLUB 🌴</div>
    <h1>POOL PARTY<br>DANCE-OFF</h1>
    <div class="how">
      Tap the falling beats when they hit the glowing line.<br>
      Keep the combo alive to make him <b>go off</b> 🕺<br>
      Don't let the HYPE meter empty out!
    </div>
    <button class="btn pulse" id="startBtn">▶ START DANCING</button>
    <div class="tag" style="opacity:.7">Best: <span id="titleBest">0</span></div>
    <div class="credit">Tap anywhere · headphones on 🎧</div>
  </div>

  <!-- GAME OVER -->
  <div id="over" class="screen hidden">
    <div class="tag">THE BEAT DROPPED OUT 💤</div>
    <div class="small">SCORE</div>
    <div class="big" id="finalScore">0</div>
    <div class="small">Max Combo <b id="finalCombo">0</b> · Best <b id="finalBest">0</b></div>
    <div id="newBest" class="tag hidden" style="color:#ffd34d;font-weight:900">⭐ NEW BEST! ⭐</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
      <button class="btn" id="againBtn">↻ DANCE AGAIN</button>
      <button class="btn btn2" id="shareBtn">↗ SHARE</button>
    </div>
  </div>
</div>

<script>
"use strict";
/* =========================================================================
   POOL PARTY DANCE-OFF — a mobile rhythm/dance tap game
   Inspired by the source clip: a guy in an open pink shirt dancing at a
   Vegas pool party. Tap the falling beats; he busts a move on every hit.
   Single-file, no external assets. Audio synthesized via WebAudio.
   ========================================================================= */

(function () {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // ---- Logical resolution (portrait). We scale to fit the screen. ----
  const W = 390, H = 780;
  let scale = 1, offX = 0, offY = 0, dpr = 1;

  function resize() {
    const vw = window.innerWidth, vh = window.innerHeight;
    dpr = Math.min(window.devicePixelRatio || 1, 2.5);
    scale = Math.min(vw / W, vh / H);
    const cw = Math.round(W * scale), ch = Math.round(H * scale);
    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';
    canvas.width = Math.round(cw * dpr);
    canvas.height = Math.round(ch * dpr);
    offX = 0; offY = 0;
  }
  window.addEventListener('resize', resize);
  resize();

  // ============================ AUDIO =====================================
  let AC = null, master = null, musicGain = null;
  const BPM = 124;
  const SPB = 60 / BPM;            // seconds per beat
  let audioStart = 0;             // AC.currentTime when song started
  let schedAhead = 0.12;          // scheduler lookahead (s)
  let nextNoteTime = 0;           // next scheduled beat time
  let beatIndex = 0;              // running 16th-note index
  let musicTimer = null;
  let muted = localStorage.getItem('ppdo_muted') === '1';
  const MASTER_VOL = 0.9;

  function initAudio() {
    if (AC) { if (AC.state === 'suspended') AC.resume(); return; }
    AC = new (window.AudioContext || window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value = muted ? 0 : MASTER_VOL; master.connect(AC.destination);
    musicGain = AC.createGain(); musicGain.gain.value = 0.85; musicGain.connect(master);
    // shared noise buffer for hats/claps
    noiseBuf = AC.createBuffer(1, AC.sampleRate * 0.4, AC.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  }
  let noiseBuf = null;

  function kick(t) {
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(140, t);
    o.frequency.exponentialRampToValueAtTime(45, t + 0.13);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(1.0, t + 0.004);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
    o.connect(g); g.connect(musicGain); o.start(t); o.stop(t + 0.24);
  }
  function hat(t, open) {
    const s = AC.createBufferSource(); s.buffer = noiseBuf;
    const hp = AC.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 7000;
    const g = AC.createGain();
    const dur = open ? 0.12 : 0.035;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(open ? 0.35 : 0.28, t + 0.003);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    s.connect(hp); hp.connect(g); g.connect(musicGain); s.start(t); s.stop(t + dur + 0.02);
  }
  function snare(t) {
    const s = AC.createBufferSource(); s.buffer = noiseBuf;
    const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1800; bp.Q.value = 0.7;
    const g = AC.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.5, t + 0.004);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
    s.connect(bp); bp.connect(g); g.connect(musicGain); s.start(t); s.stop(t + 0.2);
  }
  function bass(t, freq, dur) {
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = 'sawtooth'; o.frequency.value = freq;
    const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 520; lp.Q.value = 6;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.32, t + 0.02);
    g.gain.setValueAtTime(0.32, t + dur * 0.7);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(lp); lp.connect(g); g.connect(musicGain); o.start(t); o.stop(t + dur + 0.02);
  }
  function lead(t, freq, dur) {
    const o = AC.createOscillator(), o2 = AC.createOscillator(), g = AC.createGain();
    o.type = 'square'; o2.type = 'sawtooth';
    o.frequency.value = freq; o2.frequency.value = freq * 1.005;
    const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 2600;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.16, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(lp); o2.connect(lp); lp.connect(g); g.connect(musicGain);
    o.start(t); o2.start(t); o.stop(t + dur + 0.02); o2.stop(t + dur + 0.02);
  }
  // SFX for hits
  function hitSfx(quality) {
    if (!AC) return;
    const t = AC.currentTime;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = 'triangle';
    const base = quality === 2 ? 880 : 620;
    o.frequency.setValueAtTime(base, t);
    o.frequency.exponentialRampToValueAtTime(base * 1.5, t + 0.08);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.25, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.14);
    o.connect(g); g.connect(master); o.start(t); o.stop(t + 0.16);
  }
  function missSfx() {
    if (!AC) return;
    const t = AC.currentTime;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(200, t);
    o.frequency.exponentialRampToValueAtTime(80, t + 0.18);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.18, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
    o.connect(g); g.connect(master); o.start(t); o.stop(t + 0.22);
  }

  // Bass line (root notes per bar) — simple house progression
  const BASS_SEQ = [55.00, 55.00, 73.42, 65.41]; // A1 A1 D2 C2-ish, looped per bar
  const LEAD_SEQ = [ // 16-step lead riff (Hz, 0 = rest), pentatonic-ish
    440,0,0,523,0,587,0,0, 440,0,392,0,0,330,0,0
  ];

  // The audio scheduler: lays down the groove on a 16th grid.
  function scheduleStep(step, t) {
    const six = step % 16;         // step within bar
    const bar = Math.floor(step / 16);
    // KICK on every quarter (four-on-the-floor)
    if (six % 4 === 0) kick(t);
    // SNARE/CLAP on beats 2 and 4
    if (six === 4 || six === 12) snare(t);
    // HATS on every 8th, open on offbeats
    if (six % 2 === 0) hat(t, false);
    else hat(t, (six % 4 === 3));
    // BASS — note per beat, octave bounce on 8ths
    if (six % 4 === 0) {
      const root = BASS_SEQ[bar % BASS_SEQ.length];
      bass(t, root, SPB * 0.9);
    } else if (six % 2 === 0) {
      const root = BASS_SEQ[bar % BASS_SEQ.length];
      bass(t, root * 2, SPB * 0.45);
    }
    // LEAD riff — only after the intro builds (bar >= 2) for a "drop" feel
    if (bar % 8 >= 2) {
      const f = LEAD_SEQ[six];
      if (f) lead(t, f * (bar % 8 >= 6 ? 2 : 1), SPB * 0.5);
    }
  }

  function musicScheduler() {
    if (!AC) return;
    while (nextNoteTime < AC.currentTime + schedAhead) {
      scheduleStep(beatIndex, nextNoteTime);
      nextNoteTime += SPB / 4;   // 16th notes
      beatIndex++;
    }
  }

  // ============================ GAME STATE ================================
  const LANES = 4;
  const laneColors = ['#ff5fa8', '#ffd34d', '#5fd0ff', '#9bff6b'];
  const laneGlow   = ['#ff9ccb', '#ffe79a', '#aee8ff', '#c8ffae'];
  const HIT_Y = H - 130;          // y of the hit line (low, near the dancer's feet)
  const SPAWN_Y = 430;            // horizon / waterline / top of the play lanes
  const NOTE_TOP = 96;            // y where falling notes first appear (up high)
  const TRAVEL_MAX = 2.05;        // start fall time; shrinks as it escalates

  // Note generation runs on its own clock, a full TRAVEL ahead of the audio
  // so notes fall the whole field instead of popping in near the hit line.
  let noteStep = 0;               // running 16th index for note placement
  let noteTime = 0;               // audio time of the next 16th to consider
  let spawnGate = 0;              // notes only start after the count-in

  let state = 'title';            // title | playing | over
  let notes = [];                 // active falling notes
  let particles = [];
  let rings = [];                 // expanding shockwave rings on big hits
  let popups = [];                // score popups / judgements

  let score = 0, combo = 0, maxCombo = 0, hype = 60; // hype 0..100
  let best = +(localStorage.getItem('ppdo_best') || 0);
  let elapsed = 0;                // seconds since start
  // Levels: clear a level's worth of notes -> "LEVEL X COMPLETE" showtime
  // break -> the next, harder level begins.
  let level = 1, levelHits = 0, levelTarget = 22, levelUpFlash = 0;
  let breakActive = false, breakEnd = 0, breakBeat = -1;
  let lastTime = 0;
  let shake = 0;
  let crowdHype = 0;              // smoothed visual hype
  let comboFlash = 0;

  // Spawn bookkeeping
  let spawnedSteps = new Set();

  document.getElementById('titleBest').textContent = best;

  // ---- Level-based escalating difficulty -------------------------------
  // Each completed level steps everything up. Levels advance through the
  // showtime breaks: clear a level -> "LEVEL X COMPLETE" break -> the next,
  // harder level begins.
  function densityAt() {
    return Math.min(0.96, 0.18 + (level - 1) * 0.12);    // more notes per level
  }
  function curTravel() {
    return Math.max(0.80, TRAVEL_MAX - (level - 1) * 0.16); // notes speed up
  }
  function hypeDrainRate() {
    return 1.0 + (level - 1) * 0.75;                      // drain ramps per level
  }
  function hypeGainMult() {
    return Math.max(0.24, 1 - (level - 1) * 0.13);        // rewards shrink per level
  }

  // Stream notes a TRAVEL ahead of the current audio time so each one falls
  // the whole field. Called every frame.
  function generateNotes() {
    if (state !== 'playing' || !AC) return;
    const horizon = AC.currentTime + TRAVEL_MAX + 0.25;
    while (noteTime < horizon) {
      decideNote(noteStep, noteTime);
      noteStep++;
      noteTime += SPB / 4;        // walk the 16th-note grid
    }
  }

  let lastNoteLane = -1;
  // Decide whether a given 16th step carries a note (and which lane).
  function decideNote(step, t) {
    if (breakActive) return;              // hold notes during a dance break
    if (t < spawnGate) return;            // hold notes during the count-in
    const six = step % 16;
    const onBeat = (six % 4 === 0);       // the four quarter beats
    const onDownbeat = (six === 0 || six === 8); // beats 1 & 3 (backbone)
    const onEighth = (six % 2 === 0);
    const d = densityAt();

    let place = false;
    if (onDownbeat) place = true;                       // ~2 notes/bar always
    else if (onBeat && Math.random() < d) place = true;          // beats 2/4
    else if (onEighth && Math.random() < d * 0.5) place = true;  // 8ths later
    if (!place) return;

    // Pick a lane; avoid repeating the exact same lane back-to-back.
    let lane = (Math.random() * LANES) | 0;
    if (lane === lastNoteLane && Math.random() < 0.7) lane = (lane + 1) % LANES;
    lastNoteLane = lane;
    addNote(lane, t);

    // Higher levels: simultaneous double-notes on strong beats crank pressure.
    if (onBeat && d > 0.55 && Math.random() < (d - 0.55) * 1.1) {
      const l2 = (lane + 1 + ((Math.random() * (LANES - 1)) | 0)) % LANES;
      addNote(l2, t);
    }
  }

  function addNote(lane, hitTime) {
    notes.push({ lane, hitTime, judged: false, y: NOTE_TOP, scale: 0, dead: false,
                 travel: curTravel() });
  }

  // Map an AC time to the note's screen position (falls from NOTE_TOP to HIT_Y).
  function noteY(n, nowAC) {
    const dt = n.hitTime - nowAC;     // >0 means still falling
    return NOTE_TOP + (HIT_Y - NOTE_TOP) * (1 - dt / n.travel);
  }

  // ============================ INPUT =====================================
  function laneX(lane) {
    const fieldW = W - 24;
    const lw = fieldW / LANES;
    return 12 + lw * lane + lw / 2;
  }
  function laneWidth() { return (W - 24) / LANES; }

  function pointToLane(px) {
    const fieldW = W - 24;
    const lw = fieldW / LANES;
    let l = Math.floor((px - 12) / lw);
    return Math.max(0, Math.min(LANES - 1, l));
  }

  // Convert a client coord to logical canvas coord.
  function toLogical(clientX, clientY) {
    const r = canvas.getBoundingClientRect();
    const x = (clientX - r.left) / r.width * W;
    const y = (clientY - r.top) / r.height * H;
    return { x, y };
  }

  function handlePress(clientX, clientY) {
    if (state === 'playing') {
      const { x } = toLogical(clientX, clientY);
      const lane = pointToLane(x);
      tapLane(lane);
    }
  }

  // Judge the nearest unjudged note in a lane.
  function tapLane(lane) {
    if (!AC) return;
    const now = AC.currentTime;
    laneFlash[lane] = 1;
    let best = null, bestDt = 1e9;
    for (const n of notes) {
      if (n.lane !== lane || n.judged) continue;
      const dt = Math.abs(n.hitTime - now);
      if (dt < bestDt) { bestDt = dt; best = n; }
    }
    const PERFECT = 0.10, GOOD = 0.22;
    if (best && bestDt <= GOOD) {
      best.judged = true; best.dead = true;
      if (bestDt <= PERFECT) registerHit(2, best);
      else registerHit(1, best);
    } else {
      // empty tap — small hype penalty, breaks nothing big
      registerMiss(false, lane);
    }
  }
  const laneFlash = [0, 0, 0, 0];

  function registerHit(quality, n) {
    const gain = quality === 2 ? 100 : 50;
    combo++;
    levelHits++;                                   // progress toward level clear
    const mult = 1 + Math.floor(combo / 10) * 0.5;
    score += Math.round(gain * mult);
    maxCombo = Math.max(maxCombo, combo);
    hype = Math.min(100, hype + (quality === 2 ? 3.5 : 2.2) * hypeGainMult());
    comboFlash = 1;
    hitSfx(quality);
    dancer.poke(quality);
    const x = laneX(n.lane);
    popups.push({ x, y: HIT_Y - 30, txt: quality === 2 ? 'PERFECT' : 'GOOD',
                  col: quality === 2 ? '#ffd34d' : '#9bff6b', life: 1, vy: -34 });
    burst(x, HIT_Y, laneColors[n.lane], quality === 2 ? 10 : 6);
    // a single subtle ring on perfects only
    if (quality === 2) {
      rings.push({ x, y: HIT_Y, r: 8, vr: 4, col: '#ffe27a', life: 1 });
    }
    // 10-combo milestones: a small celebration (the only time confetti falls)
    if (combo > 0 && combo % 10 === 0) {
      confettiRain();
      popups.push({ x: W / 2, y: HIT_Y - 250, txt: combo + ' COMBO!', col: '#ffd34d', life: 1.2, vy: -20 });
    }
  }

  function registerMiss(fromNote, lane) {
    if (fromNote) {
      // a real note slipped past — break the combo and dock hype
      combo = 0;
      hype = Math.max(0, hype - 5);
      missSfx();
      popups.push({ x: laneX(lane), y: HIT_Y - 20, txt: 'MISS',
                    col: '#ff5b6e', life: .8, vy: -22 });
      shake = Math.min(shake + 4, 9);
      if (hype <= 0 && state === 'playing') gameOver();
    } else {
      // just an empty tap — tiny nudge, keep the combo
      hype = Math.max(0, hype - 1);
    }
  }

  // pointer / touch
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    for (const t of e.changedTouches) handlePress(t.clientX, t.clientY);
  }, { passive: false });
  canvas.addEventListener('mousedown', (e) => { handlePress(e.clientX, e.clientY); });
  // keyboard for desktop testing
  window.addEventListener('keydown', (e) => {
    if (state !== 'playing') return;
    const map = { 'a': 0, 's': 1, 'k': 2, 'l': 3,
                  'arrowleft': 0, 'arrowdown': 1, 'arrowup': 2, 'arrowright': 3 };
    const l = map[e.key.toLowerCase()];
    if (l != null) { e.preventDefault(); tapLane(l); }
  });

  // ============================ DANCER ====================================
  // Stylised version of the source: brown hair, glasses, open pink shirt,
  // bare chest, dark shorts. Poses cycle on each hit for a lively dance.
  const dancer = {
    pose: 0, t: 0, energy: 0, bop: 0, pop: 0, jump: 0, flash: 0, lastQ: 1,
    poke(q) {
      this.pose = (this.pose + 1) % MOVES.length;
      this.energy = 1;
      this.flash = 1;                     // subtle halo flash behind him
      this.lastQ = q;
    },
  };

  // ---- Tecktonik move set ----------------------------------------------
  // Each move is a function of the continuous beat-phase `p` (in beats) and
  // returns live arm angles so the arms keep *moving* — rolls, figure-8s,
  // head-wraps, punches and points — the signatures of electro/Tecktonik.
  // Angle convention: shoulder 0 = straight down; +ve swings toward the
  // body's left; up ≈ ±pi. elbow bends the forearm (same rotational sense).
  const TAU = Math.PI * 2;
  const MOVES = [
    // 0 — groove: planted bounce, forearms gently rolling
    (p) => { const a = p * TAU; return {
      la:[0.55, 0.7 + Math.sin(a) * 0.45], ra:[-0.55, -(0.7 + Math.sin(a) * 0.45)],
      sway: Math.sin(p * Math.PI) * 0.06, head: Math.sin(p * Math.PI) * 0.05, lift: 0 }; },
    // 1 — arm rolls: upper arms out, forearms spin fast (classic Tck)
    (p) => { const e = p * TAU; return {
      la:[1.3, e], ra:[-1.3, -e], sway: Math.sin(p * Math.PI) * 0.05, head: 0, lift: 0 }; },
    // 2 — figure-8 windmills: big shoulder circles, opposite directions
    (p) => ({ la:[p * Math.PI, 0.28], ra:[-p * Math.PI, -0.28],
      sway: Math.sin(p * TAU) * 0.05, head: Math.sin(p * TAU) * 0.06, lift: 0 }),
    // 3 — head wrap right: right arm sweeps around the head, left at chest
    (p) => ({ la:[0.5, 1.4], ra:[-1.6 + Math.cos(p * Math.PI) * 1.3, -1.35],
      sway: 0.06, head: Math.sin(p * Math.PI) * 0.08, lift: 0 }),
    // 4 — head wrap left (mirror)
    (p) => ({ la:[1.6 - Math.cos(p * Math.PI) * 1.3, 1.35], ra:[-0.5, -1.4],
      sway: -0.06, head: -Math.sin(p * Math.PI) * 0.08, lift: 0 }),
    // 5 — punches: sharp alternating side punches every half-beat
    (p) => { const k = Math.floor(p * 2) % 2; return k
      ? { la:[1.55, 0.04], ra:[-0.7, -1.6], sway: 0.05, head: 0.06, lift: 0 }
      : { la:[0.7, 1.6], ra:[-1.55, -0.04], sway: -0.05, head: -0.06, lift: 0 }; },
    // 6 — points: sharp alternating up-points each beat
    (p) => { const k = Math.floor(p) % 2; return k
      ? { la:[2.42, 0.08], ra:[-0.5, -0.9], sway: 0.06, head: 0.05, lift: 0.12 }
      : { la:[0.5, 0.9], ra:[-2.42, -0.08], sway: -0.06, head: -0.05, lift: 0.12 }; },
    // 7 — wings: broad expansive flap
    (p) => { const f = Math.sin(p * TAU); return {
      la:[1.4 + f * 0.7, 0.12], ra:[-1.4 - f * 0.7, -0.12], sway: 0, head: 0, lift: 0 }; },
    // 8 — leading hand: one hand chases the other (liquid figure-8)
    (p) => { const a = p * TAU; return {
      la:[1.2 + Math.sin(a) * 0.5, 0.7 + Math.cos(a) * 0.7],
      ra:[-1.2 + Math.sin(a + 0.7) * 0.5, -(0.7 + Math.cos(a + 0.7) * 0.7)],
      sway: Math.sin(p * Math.PI) * 0.05, head: 0, lift: 0 }; },
  ];
  // Showtime choreography — lean on the spinning moves
  const SHOW_MOVES = [1, 2, 3, 4, 7, 8, 2, 1];

  function lerp(a, b, t) { return a + (b - a) * t; }

  // ============================ SCENE DRAW ================================
  function drawBackground(t) {
    // --- Bright Vegas sky ---
    const sky = ctx.createLinearGradient(0, 0, 0, SPAWN_Y);
    sky.addColorStop(0, '#1f8fe0');
    sky.addColorStop(0.5, '#34a9ec');
    sky.addColorStop(0.82, '#84d0f2');
    sky.addColorStop(1, '#cdeaf6');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, SPAWN_Y + 6);

    // Sun flare upper-right
    const sun = ctx.createRadialGradient(330, 54, 4, 330, 54, 150);
    sun.addColorStop(0, 'rgba(255,252,235,0.95)');
    sun.addColorStop(0.4, 'rgba(255,250,225,0.35)');
    sun.addColorStop(1, 'rgba(255,250,225,0)');
    ctx.fillStyle = sun; ctx.fillRect(120, 0, W - 120, 220);

    // Palms rising from the horizon, framing the hero
    drawPalm(38, SPAWN_Y, 0.60, t, 1.4, false);
    drawPalm(354, SPAWN_Y, 0.64, t, 2.6, false);
    // Hero palm — tall, centred behind the dancer (like the source)
    drawPalm(W / 2 + 8, SPAWN_Y, 1.34, t, 0.0, true);

    // Warm cabana/club band along the waterline
    const band = ctx.createLinearGradient(0, SPAWN_Y - 40, 0, SPAWN_Y);
    band.addColorStop(0, '#e8d6b8');
    band.addColorStop(1, '#cbb48f');
    ctx.fillStyle = band;
    ctx.fillRect(0, SPAWN_Y - 34, W, 38);
    // distant building blocks
    ctx.fillStyle = 'rgba(208,192,162,0.9)';
    ctx.fillRect(0, SPAWN_Y - 44, 76, 14); ctx.fillRect(298, SPAWN_Y - 46, 94, 16);

    // Cabana umbrellas (cream w/ red scalloped trim)
    drawUmbrella(64, SPAWN_Y - 24, 0.78, t, 0.4);
    drawUmbrella(326, SPAWN_Y - 26, 0.84, t, 1.1);

    // Crowd dancing behind the hero
    drawCrowd(t);

    // --- Pool below the waterline (playfield backdrop) ---
    ctx.fillStyle = '#d9c39c';
    ctx.fillRect(0, SPAWN_Y - 6, W, 9);
    const deck = ctx.createLinearGradient(0, SPAWN_Y, 0, H);
    deck.addColorStop(0, '#34c2e6');
    deck.addColorStop(0.30, '#1391c6');
    deck.addColorStop(1, '#06375a');
    ctx.fillStyle = deck;
    ctx.fillRect(0, SPAWN_Y + 3, W, H - SPAWN_Y);

    // shimmering water lines
    ctx.globalAlpha = 0.16; ctx.strokeStyle = '#d4f4ff'; ctx.lineWidth = 2;
    for (let i = 0; i < 7; i++) {
      const yy = SPAWN_Y + 16 + i * 18;
      ctx.beginPath();
      for (let x = 0; x <= W; x += 12) {
        const yo = Math.sin((x * 0.05) + t * 2 + i) * 2.4;
        if (x === 0) ctx.moveTo(x, yy + yo); else ctx.lineTo(x, yy + yo);
      }
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // soft sunny warm overlay over the sky/scene
    ctx.globalAlpha = 0.06; ctx.fillStyle = '#ffdf9a';
    ctx.fillRect(0, 0, W, SPAWN_Y); ctx.globalAlpha = 1;
  }

  function drawPalm(x, baseY, s, t, ph, hero) {
    const sway = Math.sin(t * 1.1 + ph) * 0.045;
    const TH = 150;                       // trunk height (pre-scale)
    ctx.save();
    ctx.translate(x, baseY);
    ctx.scale(s, s);
    const topX = Math.sin(sway) * 14;     // crown leans with the breeze

    // --- trunk: tapered, curved, with segment rings ---
    ctx.fillStyle = '#a17a4a';
    ctx.beginPath();
    ctx.moveTo(-8.5, 0);
    ctx.quadraticCurveTo(-3, -TH * 0.5, topX - 4.5, -TH);
    ctx.lineTo(topX + 4.5, -TH);
    ctx.quadraticCurveTo(8.5, -TH * 0.5, 8.5, 0);
    ctx.closePath(); ctx.fill();
    // shaded side
    ctx.fillStyle = 'rgba(110,76,40,0.35)';
    ctx.beginPath();
    ctx.moveTo(2, 0);
    ctx.quadraticCurveTo(5.5, -TH * 0.5, topX + 2, -TH);
    ctx.lineTo(topX + 4.5, -TH);
    ctx.quadraticCurveTo(8.5, -TH * 0.5, 8.5, 0);
    ctx.closePath(); ctx.fill();
    // segment rings
    ctx.strokeStyle = 'rgba(90,60,30,0.45)'; ctx.lineWidth = 1.4;
    for (let i = 1; i < 9; i++) {
      const yy = -TH * i / 9, w = 8 - i * 0.45, cx = topX * (i / 9);
      ctx.beginPath(); ctx.moveTo(cx - w, yy); ctx.quadraticCurveTo(cx, yy + 3, cx + w, yy); ctx.stroke();
    }

    // --- crown ---
    ctx.translate(topX, -TH);
    // coconuts
    ctx.fillStyle = '#5d3f22';
    for (const [dx, dy] of [[-6, 3], [6, 4], [0, 7]]) { ctx.beginPath(); ctx.arc(dx, dy, 4.2, 0, 7); ctx.fill(); }
    // fronds — two layers for depth
    const NF = 11;
    const drawFronds = (len, col, lw) => {
      ctx.fillStyle = col;
      for (let i = 0; i < NF; i++) {
        const a = -Math.PI * 0.5 + (i / (NF - 1) - 0.5) * Math.PI * 2.05;
        const droop = 14 + Math.abs(Math.sin(a)) * 10;
        ctx.save(); ctx.rotate(a + Math.sin(t * 1.6 + i + ph) * 0.03);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(len * 0.5, -lw, len, droop);
        ctx.quadraticCurveTo(len * 0.55, droop + lw, 0, 4);
        ctx.closePath(); ctx.fill();
        ctx.restore();
      }
    };
    drawFronds(58, '#1f7a34', 9);          // back/darker
    drawFronds(50, '#36a54a', 7);          // front/lighter
    // center
    ctx.fillStyle = '#15622a';
    ctx.beginPath(); ctx.arc(0, 2, 7, 0, 7); ctx.fill();
    ctx.restore();
  }

  function drawUmbrella(x, y, s, t, ph) {
    const sway = Math.sin(t * 1.2 + ph) * 0.02;
    ctx.save(); ctx.translate(x, y); ctx.scale(s, s); ctx.rotate(sway);
    const R = 46;
    // pole
    ctx.strokeStyle = 'rgba(110,84,58,.6)'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, 46); ctx.stroke();
    // canopy dome
    const cg = ctx.createLinearGradient(0, -R * 0.8, 0, 2);
    cg.addColorStop(0, '#f7f0e0'); cg.addColorStop(1, '#e6d9bf');
    ctx.fillStyle = cg;
    ctx.beginPath(); ctx.moveTo(-R, 0); ctx.quadraticCurveTo(0, -R * 0.82, R, 0);
    ctx.quadraticCurveTo(0, -8, -R, 0); ctx.fill();
    // panel seams
    ctx.strokeStyle = 'rgba(180,160,128,.55)'; ctx.lineWidth = 1;
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath(); ctx.moveTo(0, -R * 0.78);
      ctx.quadraticCurveTo(i * R * 0.34, -R * 0.32, i * R * 0.5, -1); ctx.stroke();
    }
    // red scalloped trim
    ctx.fillStyle = '#d6392f';
    const sc = 6;
    for (let i = 0; i < sc; i++) {
      const x0 = -R + (i * 2 * R / sc), x1 = -R + ((i + 1) * 2 * R / sc);
      ctx.beginPath(); ctx.moveTo(x0, -1);
      ctx.quadraticCurveTo((x0 + x1) / 2, 9, x1, -1); ctx.fill();
    }
    // finial
    ctx.fillStyle = '#cdbf9f';
    ctx.beginPath(); ctx.arc(0, -R * 0.8, 2.6, 0, 7); ctx.fill();
    ctx.restore();
  }

  function drawCrowd(t) {
    // bikini-clad partygoers dancing behind the hero
    const skins = ['#cfa074', '#e3bd92', '#b07f52', '#dcb285'];
    const tops  = ['#1c1c22', '#e35a8c', '#2fb8a8', '#f0c14b', '#1c1c22', '#d84f7a'];
    const hairs = ['#3a2a1a', '#6b4a2a', '#2a2a2a', '#8a5a2a'];
    const base = SPAWN_Y - 2;
    // x, scale  (flanking the hero in the distance — smaller = further)
    const ppl = [[22,0.6],[54,0.68],[90,0.6],[304,0.64],[340,0.7],[370,0.6]];
    for (let i = 0; i < ppl.length; i++) {
      const [x, sc] = ppl[i];
      const sk = skins[i % skins.length], top = tops[i % tops.length], hair = hairs[i % hairs.length];
      const bob = Math.sin(t * 3.6 + i * 1.7) * 4;
      const aL = -2.0 + Math.sin(t * 3.6 + i) * 0.5;
      const aR = -1.1 + Math.sin(t * 3.6 + i + 1.3) * 0.5;
      ctx.save(); ctx.translate(x, base + bob); ctx.scale(sc * (i % 2 ? -1 : 1), sc);
      ctx.globalAlpha = 0.96;
      // legs
      ctx.strokeStyle = sk; ctx.lineWidth = 6; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(-5, -30); ctx.lineTo(-6, 0); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(5, -30); ctx.lineTo(6, 0); ctx.stroke();
      // bikini bottom
      ctx.fillStyle = top; ctx.fillRect(-8, -34, 16, 8);
      // torso
      ctx.fillStyle = sk; roundRectPath(-8, -56, 16, 26, 5); ctx.fill();
      // bikini top
      ctx.fillStyle = top; ctx.fillRect(-9, -54, 18, 6);
      // arms up (dancing)
      ctx.strokeStyle = sk; ctx.lineWidth = 5.5;
      ctx.save(); ctx.translate(-7, -52); ctx.rotate(aL);
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, 22); ctx.stroke(); ctx.restore();
      ctx.save(); ctx.translate(7, -52); ctx.rotate(aR);
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, 22); ctx.stroke(); ctx.restore();
      // head + hair + shades
      ctx.fillStyle = sk; ctx.beginPath(); ctx.arc(0, -64, 8.5, 0, 7); ctx.fill();
      ctx.fillStyle = hair;
      ctx.beginPath(); ctx.arc(0, -67, 9.2, Math.PI, 2 * Math.PI); ctx.fill();
      ctx.fillRect(-9.2, -67, 3.4, 8);
      ctx.fillStyle = '#15151a'; ctx.fillRect(-6.5, -65, 13, 3.4);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  // ----- The hero dancer -----
  const DBG_POSE = /[#&?]pose=(\d+)/.exec(location.hash);
  function drawDancer(t) {
    const cx = W / 2;
    const groundY = HIT_Y - 46;     // dance right above the catch line
    if (DBG_POSE) { dancer.pose = (+DBG_POSE[1]) % MOVES.length; dancer.energy = 1; }
    dancer.energy = Math.max(0, dancer.energy - 0.05);
    dancer.flash = Math.max(0, dancer.flash - 0.06);
    // live Tecktonik move — arms keep moving with the beat; he stays
    // vertically planted (no jumping).
    const beatPhase = AC ? ((AC.currentTime - audioStart) / SPB) : t / SPB;
    const A = MOVES[dancer.pose](beatPhase);
    const bop = Math.abs(Math.sin(beatPhase * Math.PI)) * 2;      // tiny, not a jump
    const sway = A.sway + Math.sin(beatPhase * Math.PI) * 0.03;

    // ground shadow
    ctx.save(); ctx.translate(cx, groundY + 3);
    ctx.globalAlpha = 0.18; ctx.fillStyle = '#04263a';
    ctx.beginPath(); ctx.ellipse(0, 0, 44, 9, 0, 0, 7); ctx.fill();
    ctx.restore();

    // subtle halo glow behind him on a hit (gold = perfect, green = good)
    if (dancer.flash > 0.01) {
      const hc = dancer.lastQ === 2 ? '255,211,77' : '155,255,107';
      const hg = ctx.createRadialGradient(cx, groundY - 120, 8, cx, groundY - 120, 62);
      hg.addColorStop(0, `rgba(${hc},${0.22 * dancer.flash})`);
      hg.addColorStop(1, `rgba(${hc},0)`);
      ctx.fillStyle = hg;
      ctx.beginPath(); ctx.arc(cx, groundY - 120, 62, 0, 7); ctx.fill();
    }

    ctx.save();
    ctx.translate(cx, groundY - bop);
    ctx.rotate(sway);
    ctx.scale(1.4, 1.4);              // hero presence — big and close

    const skin = '#dca067', skinSh = '#c0824b', skinHi = '#ecbb86';
    const shirt = '#f491b8', shirtSh = '#dd6fa0', shirtHi = '#ffb7d4';
    const shorts = '#39414d', shortsSh = '#2b323c';

    // ---- legs ----
    const legLift = A.lift;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    // left leg
    ctx.strokeStyle = skin; ctx.lineWidth = 15;
    ctx.beginPath(); ctx.moveTo(-10, -78); ctx.lineTo(-14, -40 + legLift * 14); ctx.lineTo(-16, 0); ctx.stroke();
    ctx.strokeStyle = skinSh; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(-13, -70); ctx.lineTo(-16, -6); ctx.stroke();
    // right leg
    ctx.strokeStyle = skin; ctx.lineWidth = 15;
    ctx.beginPath(); ctx.moveTo(10, -78); ctx.lineTo(14, -40 - legLift * 14); ctx.lineTo(16, 0 - legLift * 18); ctx.stroke();
    ctx.strokeStyle = skinSh; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(13, -70); ctx.lineTo(16, -6 - legLift * 18); ctx.stroke();
    // flip-flops
    ctx.fillStyle = '#2a2a2e';
    ctx.beginPath(); ctx.ellipse(-16, 1, 8, 3.2, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(16, 1 - legLift * 18, 8, 3.2, 0, 0, 7); ctx.fill();

    // ---- shorts (charcoal, knee-length) ----
    ctx.fillStyle = shorts;
    ctx.beginPath();
    ctx.moveTo(-20, -98); ctx.lineTo(20, -98);
    ctx.lineTo(23, -52); ctx.lineTo(3, -50); ctx.lineTo(0, -64);
    ctx.lineTo(-3, -50); ctx.lineTo(-23, -52); ctx.closePath(); ctx.fill();
    ctx.fillStyle = shortsSh;
    ctx.beginPath(); ctx.moveTo(3, -50); ctx.lineTo(23, -52); ctx.lineTo(20, -98); ctx.lineTo(8, -96); ctx.closePath(); ctx.fill();
    // waistband + drawstring
    ctx.fillStyle = '#222831'; ctx.fillRect(-20, -100, 40, 5);
    ctx.strokeStyle = '#cfd3da'; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(-3, -96); ctx.lineTo(-5, -88); ctx.moveTo(3, -96); ctx.lineTo(5, -88); ctx.stroke();

    // ---- bare torso under the open shirt ----
    ctx.fillStyle = skin;
    roundRectPath(-19, -152, 38, 62, 13); ctx.fill();
    // pecs + abs shading
    ctx.strokeStyle = skinSh; ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(0, -150); ctx.lineTo(0, -104); ctx.stroke(); // centre line
    ctx.beginPath(); ctx.moveTo(-12, -132); ctx.quadraticCurveTo(0, -126, 12, -132); ctx.stroke(); // pec line
    for (let r = 0; r < 3; r++) { const yy = -120 + r * 9;
      ctx.beginPath(); ctx.moveTo(-9, yy); ctx.lineTo(-3, yy); ctx.moveTo(3, yy); ctx.lineTo(9, yy); ctx.stroke(); }
    // highlight
    ctx.fillStyle = 'rgba(255,235,205,0.35)';
    ctx.beginPath(); ctx.ellipse(-8, -138, 5, 9, 0, 0, 7); ctx.fill();
    // necklace chain
    ctx.strokeStyle = '#e8c45a'; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.moveTo(-9, -150); ctx.quadraticCurveTo(0, -138, 9, -150); ctx.stroke();
    ctx.fillStyle = '#f0d878'; ctx.beginPath(); ctx.arc(0, -141, 1.8, 0, 7); ctx.fill();

    // ---- arms (pink long sleeves) over the open shirt ----
    drawArm(-16, -148, A.la, skin, skinSh, shirt, shirtSh, -1);
    drawArm(16, -148, A.ra, skin, skinSh, shirt, shirtSh, 1);

    // ---- open pink shirt: two front panels ----
    const panel = (sgn) => {
      ctx.fillStyle = shirt;
      ctx.beginPath();
      ctx.moveTo(sgn * 22, -154);
      ctx.lineTo(sgn * 9, -150);
      ctx.quadraticCurveTo(sgn * 12, -118, sgn * 15, -90);
      ctx.lineTo(sgn * 26, -92);
      ctx.quadraticCurveTo(sgn * 28, -124, sgn * 22, -154);
      ctx.closePath(); ctx.fill();
      // inner shadow fold (along the open edge)
      ctx.fillStyle = shirtSh;
      ctx.beginPath();
      ctx.moveTo(sgn * 9, -150); ctx.quadraticCurveTo(sgn * 12, -118, sgn * 15, -90);
      ctx.lineTo(sgn * 19, -91); ctx.quadraticCurveTo(sgn * 16, -120, sgn * 14, -150);
      ctx.closePath(); ctx.fill();
      // bright outer highlight edge
      ctx.strokeStyle = shirtHi; ctx.lineWidth = 1.6;
      ctx.beginPath(); ctx.moveTo(sgn * 22, -152); ctx.quadraticCurveTo(sgn * 27, -124, sgn * 25, -94); ctx.stroke();
      // a couple of buttons hint near the hem
      ctx.fillStyle = shirtHi;
      ctx.beginPath(); ctx.arc(sgn * 13, -100, 1.3, 0, 7); ctx.fill();
    };
    panel(-1); panel(1);
    // collar
    ctx.fillStyle = shirtSh;
    ctx.beginPath(); ctx.moveTo(-21, -154); ctx.lineTo(-3, -150); ctx.lineTo(-10, -138); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(21, -154); ctx.lineTo(3, -150); ctx.lineTo(10, -138); ctx.closePath(); ctx.fill();

    // ---- neck + head ----
    ctx.fillStyle = skin; ctx.fillRect(-6, -164, 12, 15);
    ctx.fillStyle = skinSh; ctx.fillRect(-6, -151, 12, 3);
    ctx.save();
    ctx.translate(0, -180); ctx.rotate(A.head + sway * 0.5);
    // head
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.ellipse(0, 0, 16, 18.5, 0, 0, 7); ctx.fill();
    // jaw shadow
    ctx.fillStyle = skinSh;
    ctx.beginPath(); ctx.ellipse(0, 10, 11, 6, 0, 0, 7); ctx.fill();
    // ears
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.ellipse(-16, 1, 3.2, 5, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(16, 1, 3.2, 5, 0, 0, 7); ctx.fill();
    // hair (brown, short, slightly messy) + sideburns
    ctx.fillStyle = '#46301d';
    ctx.beginPath();
    ctx.moveTo(-17, 1);
    ctx.lineTo(-17, -7);
    ctx.quadraticCurveTo(-18, -24, 0, -23);
    ctx.quadraticCurveTo(19, -24, 17, -6);
    ctx.lineTo(17, 1);
    ctx.quadraticCurveTo(13, -9, 8, -10);
    ctx.quadraticCurveTo(2, -13, -2, -11);
    ctx.quadraticCurveTo(-10, -10, -13, -3);
    ctx.quadraticCurveTo(-15, 0, -17, 1);
    ctx.fill();
    // hair highlight
    ctx.fillStyle = 'rgba(120,82,48,0.6)';
    ctx.beginPath(); ctx.ellipse(-6, -16, 6, 4, -0.4, 0, 7); ctx.fill();
    // eyebrows
    ctx.fillStyle = '#3a2616';
    ctx.fillRect(-11, -3, 7, 1.8); ctx.fillRect(4, -3, 7, 1.8);
    // glasses (filled dark lenses, black frame)
    ctx.fillStyle = '#15151a';
    roundRectPath(-12.5, -1.5, 10, 8, 2.4); ctx.fill();
    roundRectPath(2.5, -1.5, 10, 8, 2.4); ctx.fill();
    ctx.strokeStyle = '#0c0c10'; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(-2.5, 1.5); ctx.lineTo(2.5, 1.5); ctx.stroke();      // bridge
    ctx.moveTo(-12.5, 1.5); ctx.lineTo(-16, 0); ctx.moveTo(12.5, 1.5); ctx.lineTo(16, 0); ctx.stroke(); // temples
    // lens glint
    ctx.strokeStyle = 'rgba(255,255,255,0.45)'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(-10.5, 0.5); ctx.lineTo(-7.5, -0.5); ctx.moveTo(4.5, 0.5); ctx.lineTo(7.5, -0.5); ctx.stroke();
    // open mouth (loving it) — grows with hype
    ctx.fillStyle = '#52202c';
    const m = 2.2 + crowdHype * 0.03 + dancer.energy * 2.2;
    ctx.beginPath(); ctx.ellipse(0, 9, 4.2, m, 0, 0, 7); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(0, 9 - m * 0.5, 3.2, 1.4, 0, 0, 7); ctx.fill(); // teeth
    ctx.restore();

    ctx.restore();
  }

  function drawArm(sx, sy, ang, skin, skinSh, shirt, shirtSh, side) {
    // ang = [shoulder, elbow]; shoulder 0 = straight down, +ve swings toward
    // the body's left. Angles drive directly (the move animates them), so
    // rolls/windmills aren't damped. Joints are rounded (shoulder + elbow
    // caps) so the arm reads as one smooth limb.
    const sh = ang[0];
    const el = ang[1];
    const upper = 27, fore = 25;
    ctx.save(); ctx.translate(sx, sy);
    ctx.lineCap = 'round';
    // shoulder cap blends arm into the shirt
    ctx.fillStyle = shirt; ctx.beginPath(); ctx.arc(0, 0, 8.5, 0, 7); ctx.fill();
    ctx.rotate(sh);
    // upper arm — pink sleeve
    ctx.strokeStyle = shirt; ctx.lineWidth = 15;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, upper); ctx.stroke();
    ctx.strokeStyle = shirtSh; ctx.lineWidth = 4;            // soft seam
    ctx.beginPath(); ctx.moveTo(side * 3.5, 5); ctx.lineTo(side * 3.5, upper - 4); ctx.stroke();
    // elbow joint
    ctx.translate(0, upper);
    ctx.fillStyle = shirt; ctx.beginPath(); ctx.arc(0, 0, 7.5, 0, 7); ctx.fill();
    ctx.rotate(el);
    // forearm — sleeve to a rolled cuff, then skin + hand
    ctx.strokeStyle = shirt; ctx.lineWidth = 13;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, fore * 0.55); ctx.stroke();
    ctx.strokeStyle = shirtSh; ctx.lineWidth = 15;          // rolled cuff
    ctx.beginPath(); ctx.moveTo(0, fore * 0.5); ctx.lineTo(0, fore * 0.64); ctx.stroke();
    ctx.strokeStyle = skin; ctx.lineWidth = 10;             // wrist
    ctx.beginPath(); ctx.moveTo(0, fore * 0.64); ctx.lineTo(0, fore); ctx.stroke();
    // hand (fist)
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.arc(0, fore + 2, 7, 0, 7); ctx.fill();
    ctx.strokeStyle = skinSh; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(-4, fore + 1); ctx.lineTo(4, fore + 1); ctx.stroke();
    ctx.restore();
  }

  function roundRectPath(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ============================ PLAYFIELD =================================
  // Lane structure — drawn BEHIND the dancer so he isn't striped over.
  function drawLanesBack() {
    const lw = laneWidth();
    for (let l = 0; l < LANES; l++) {
      const x = 12 + lw * l;
      ctx.fillStyle = l % 2 ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.08)';
      ctx.fillRect(x, SPAWN_Y, lw, H - SPAWN_Y);
      ctx.strokeStyle = 'rgba(255,255,255,0.10)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x, SPAWN_Y); ctx.lineTo(x, H); ctx.stroke();
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.10)';
    ctx.beginPath(); ctx.moveTo(12 + lw * LANES, SPAWN_Y); ctx.lineTo(12 + lw * LANES, H); ctx.stroke();
  }

  // Hit line, target rings, lane flashes and the falling notes — drawn IN
  // FRONT of the dancer so the action sits right where he's dancing.
  function drawPlay(nowAC) {
    const lw = laneWidth();
    // lane flash on tap (bright pulse up the lane)
    for (let l = 0; l < LANES; l++) {
      if (laneFlash[l] > 0) {
        const x = 12 + lw * l;
        ctx.globalAlpha = laneFlash[l] * 0.45;
        const g = ctx.createLinearGradient(0, HIT_Y, 0, HIT_Y - 180);
        g.addColorStop(0, laneColors[l]); g.addColorStop(1, 'transparent');
        ctx.fillStyle = g; ctx.fillRect(x, HIT_Y - 180, lw, 180);
        ctx.globalAlpha = 1;
        laneFlash[l] = Math.max(0, laneFlash[l] - 0.08);
      }
    }

    // HIT LINE with glow
    ctx.save();
    ctx.shadowColor = '#fff'; ctx.shadowBlur = 16;
    ctx.strokeStyle = 'rgba(255,255,255,0.92)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(12, HIT_Y); ctx.lineTo(12 + lw * LANES, HIT_Y); ctx.stroke();
    ctx.restore();
    // hit target rings
    for (let l = 0; l < LANES; l++) {
      const x = laneX(l);
      ctx.strokeStyle = laneColors[l]; ctx.lineWidth = 3;
      ctx.globalAlpha = 0.95;
      ctx.beginPath(); ctx.arc(x, HIT_Y, 24, 0, 7); ctx.stroke();
      ctx.globalAlpha = 0.2; ctx.fillStyle = laneColors[l];
      ctx.beginPath(); ctx.arc(x, HIT_Y, 22, 0, 7); ctx.fill();
      ctx.globalAlpha = 1;
    }

    // NOTES
    for (const n of notes) {
      const y = noteY(n, nowAC);
      n.scale = Math.min(1, n.scale + 0.12);
      const x = laneX(n.lane);
      const r = 22 * n.scale;
      // trail
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = laneGlow[n.lane];
      ctx.beginPath(); ctx.ellipse(x, y - 14, r * 0.7, r * 1.5, 0, 0, 7); ctx.fill();
      ctx.globalAlpha = 1;
      // body
      ctx.save();
      ctx.shadowColor = laneColors[n.lane]; ctx.shadowBlur = 14;
      const g = ctx.createRadialGradient(x - 6, y - 6, 2, x, y, r);
      g.addColorStop(0, '#fff'); g.addColorStop(0.4, laneGlow[n.lane]); g.addColorStop(1, laneColors[n.lane]);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
      ctx.restore();
      // music-note icon
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.font = `${Math.round(20 * n.scale)}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('♪', x, y + 1);
    }
  }

  // ============================ FX ========================================
  function burst(x, y, color, n) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2, sp = 1 + Math.random() * 4;
      particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1,
        life: 1, color, size: 2 + Math.random() * 3 });
    }
  }
  function confettiRain() {
    const cols = ['#ff5fa8', '#ffd34d', '#5fd0ff', '#9bff6b', '#fff'];
    for (let i = 0; i < 3; i++) {
      particles.push({ x: Math.random() * W, y: -10,
        vx: (Math.random() - 0.5) * 1.5, vy: 2 + Math.random() * 2,
        life: 2.2, color: cols[(Math.random() * cols.length) | 0],
        size: 3 + Math.random() * 3, conf: true, rot: Math.random() * 7, vr: (Math.random()-.5)*.4 });
    }
  }
  function updateParticles(dt) {
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      p.vy += p.conf ? 0.04 : 0.18;
      if (p.conf) p.rot += p.vr;
      p.life -= dt * (p.conf ? 0.5 : 1.6);
    }
    particles = particles.filter(p => p.life > 0 && p.y < H + 20);
    for (const r of rings) { r.r += r.vr; r.vr *= 0.96; r.life -= dt * 2.2; }
    rings = rings.filter(r => r.life > 0);
  }
  function drawRings() {
    for (const r of rings) {
      ctx.globalAlpha = Math.max(0, r.life) * 0.8;
      ctx.strokeStyle = r.col; ctx.lineWidth = 3 * r.life + 1;
      ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, 7); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, Math.min(1, p.life));
      ctx.fillStyle = p.color;
      if (p.conf) {
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
        ctx.fillRect(-p.size, -p.size * 0.6, p.size * 2, p.size * 1.2);
        ctx.restore();
      } else {
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, 7); ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }
  function drawPopups(dt) {
    for (const p of popups) {
      p.y += p.vy * dt; p.life -= dt * 1.6;
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.col;
      ctx.font = '900 22px Trebuchet MS, sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.strokeStyle = 'rgba(0,0,0,.5)'; ctx.lineWidth = 4;
      ctx.strokeText(p.txt, p.x, p.y); ctx.fillText(p.txt, p.x, p.y);
    }
    ctx.globalAlpha = 1;
    popups = popups.filter(p => p.life > 0);
  }

  // ============================ HUD =======================================
  function drawHUD() {
    // top translucent bar
    ctx.fillStyle = 'rgba(6,16,24,0.28)';
    ctx.fillRect(0, 0, W, 64);

    // score
    ctx.fillStyle = '#fff';
    ctx.font = '900 30px Trebuchet MS, sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.strokeStyle = 'rgba(0,0,0,.45)'; ctx.lineWidth = 4;
    ctx.strokeText(score.toLocaleString(), 54, 26);
    ctx.fillText(score.toLocaleString(), 54, 26);
    ctx.font = '700 11px Trebuchet MS, sans-serif';
    ctx.fillStyle = '#cfe2f0';
    ctx.fillText('SCORE', 55, 46);

    // LEVEL pill (top center) with a progress fill toward the next break
    const pw = 96, ph = 20, px = W / 2 - pw / 2, py = 5;
    ctx.fillStyle = 'rgba(6,16,24,0.5)';
    roundRectPath(px, py, pw, ph, 10); ctx.fill();
    ctx.save();
    roundRectPath(px, py, pw, ph, 10); ctx.clip();
    ctx.fillStyle = 'rgba(255,211,77,0.32)';
    ctx.fillRect(px, py, pw * Math.min(1, levelHits / levelTarget), ph);
    ctx.restore();
    ctx.strokeStyle = 'rgba(255,255,255,0.45)'; ctx.lineWidth = 1.4;
    roundRectPath(px, py, pw, ph, 10); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = '900 13px Trebuchet MS, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('LEVEL ' + level, W / 2, py + ph / 2 + 0.5);

    // combo (center, punchy) — sits below the level pill
    if (combo > 1) {
      comboFlash = Math.max(0, comboFlash - 0.05);
      const s = 1 + comboFlash * 0.4;
      ctx.save();
      ctx.translate(W / 2, 46); ctx.scale(s, s);
      ctx.fillStyle = combo >= 30 ? '#ffd34d' : '#fff';
      ctx.font = '900 26px Trebuchet MS, sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.strokeStyle = 'rgba(0,0,0,.5)'; ctx.lineWidth = 5;
      ctx.strokeText(combo + 'x', 0, 0); ctx.fillText(combo + 'x', 0, 0);
      ctx.restore();
    }

    // HYPE meter (right)
    const mx = W - 130, my = 18, mw = 116, mh = 16;
    ctx.fillStyle = 'rgba(0,0,0,.35)';
    roundRectPath(mx, my, mw, mh, 8); ctx.fill();
    const hg = ctx.createLinearGradient(mx, 0, mx + mw, 0);
    hg.addColorStop(0, '#5fd0ff'); hg.addColorStop(0.5, '#ffd34d'); hg.addColorStop(1, '#ff5fa8');
    ctx.save();
    roundRectPath(mx, my, mw, mh, 8); ctx.clip();
    ctx.fillStyle = hg; ctx.fillRect(mx, my, mw * (hype / 100), mh);
    // low-hype warning pulse
    if (hype < 25) {
      ctx.fillStyle = `rgba(255,40,60,${0.25 + 0.25 * Math.sin(elapsed * 12)})`;
      ctx.fillRect(mx, my, mw, mh);
    }
    ctx.restore();
    ctx.strokeStyle = 'rgba(255,255,255,.5)'; ctx.lineWidth = 1.5;
    roundRectPath(mx, my, mw, mh, 8); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = '900 11px Trebuchet MS,sans-serif';
    ctx.textAlign = 'right'; ctx.fillText('🔥 HYPE', mx + mw, my + mh + 12);
  }

  // ============================ LOOP ======================================
  function frame(ms) {
    requestAnimationFrame(frame);
    const tSec = ms / 1000;
    let dt = lastTime ? Math.min(0.05, tSec - lastTime) : 0.016;
    lastTime = tSec;

    const counting = state === 'playing' && AC && AC.currentTime < spawnGate;
    if (state === 'playing') {
      elapsed = AC ? Math.max(0, AC.currentTime - spawnGate) : elapsed + dt;
      generateNotes();   // (decideNote pauses itself during a break)

      // clear a level's worth of notes -> showtime break (level complete)
      if (!breakActive && !counting && levelHits >= levelTarget) startBreak();

      if (levelUpFlash > 0) levelUpFlash = Math.max(0, levelUpFlash - dt);

      if (breakActive) {
        // he solos: a breather (drain paused) — no big hype refill
        crowdHype += (100 - crowdHype) * 0.06;
        const beat = Math.floor((AC.currentTime - audioStart) / SPB);
        if (beat !== breakBeat) {
          breakBeat = beat;
          // switch to a new spinning move every 2 beats; flash on the change
          if (beat % 2 === 0) {
            dancer.pose = SHOW_MOVES[(beat / 2 | 0) % SHOW_MOVES.length];
            dancer.flash = 1; dancer.lastQ = 2;
          }
        }
        dancer.energy = 1;                // stay fully expressive
        if (AC.currentTime >= breakEnd) endBreak();
      } else if (!counting) {
        // passive hype drain accelerates — you can't coast forever
        hype = Math.max(0, hype - dt * hypeDrainRate());
        if (hype <= 0) { gameOver(); }
        crowdHype += ((combo > 8 ? 100 : hype) - crowdHype) * 0.05;
      }
    }

    // expire missed notes (past the GOOD window)
    if (AC && state === 'playing') {
      const now = AC.currentTime;
      for (const n of notes) {
        if (!n.judged && now - n.hitTime > 0.26) {
          n.judged = true; n.dead = true;
          registerMiss(true, n.lane);
        }
      }
    }
    notes = notes.filter(n => !n.dead && (!AC || n.hitTime - AC.currentTime > -0.4));

    // ---- render ----
    ctx.setTransform(dpr * scale, 0, 0, dpr * scale, offX, offY);
    let sx = 0, sy = 0;
    if (shake > 0) { sx = (Math.random() - .5) * shake; sy = (Math.random() - .5) * shake; shake *= 0.86; if (shake < .3) shake = 0; }
    ctx.save();
    ctx.translate(sx, sy);
    ctx.clearRect(-10, -10, W + 20, H + 20);

    const nowAC = AC ? AC.currentTime : 0;
    drawBackground(tSec);
    if (state !== 'title' && !breakActive) drawLanesBack();   // lane structure behind him
    if (breakActive) drawSpotlight();          // focus the eye on his solo
    drawDancer(tSec);
    if (state !== 'title' && !breakActive) drawPlay(nowAC);   // notes + catch line in front

    updateParticles(dt);
    drawParticles();
    if (state !== 'title') drawRings();
    drawPopups(dt);

    if (state === 'playing') drawHUD();
    if (counting) drawCountIn(AC.currentTime);
    if (breakActive) drawBreakBanner(nowAC);
    if (levelUpFlash > 0 && !breakActive) drawLevelUp();
    ctx.restore();
  }
  requestAnimationFrame(frame);

  // Gentle vignette so the eye settles on the dancer during his solo.
  function drawSpotlight() {
    const g = ctx.createRadialGradient(W / 2, HIT_Y - 150, 60, W / 2, HIT_Y - 150, 320);
    g.addColorStop(0, 'rgba(8,20,30,0)');
    g.addColorStop(1, 'rgba(6,14,22,0.34)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  }

  // "LEVEL X COMPLETE" banner shown during the level-clear break.
  function drawBreakBanner(now) {
    const left = Math.max(0, breakEnd - now);
    const pulse = 1 + Math.sin(now * 8) * 0.05;
    ctx.save();
    ctx.translate(W / 2, 142);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff'; ctx.font = '800 17px Trebuchet MS, sans-serif';
    ctx.fillText('SHOWTIME!', 0, -34);
    ctx.scale(pulse, pulse);
    ctx.lineWidth = 6; ctx.strokeStyle = 'rgba(0,0,0,.45)';
    ctx.fillStyle = '#ffd34d';
    ctx.font = '900 34px Trebuchet MS, sans-serif';
    ctx.strokeText('LEVEL ' + level, 0, 0); ctx.fillText('LEVEL ' + level, 0, 0);
    ctx.font = '900 22px Trebuchet MS, sans-serif';
    ctx.strokeText('COMPLETE', 0, 28); ctx.fillText('COMPLETE', 0, 28);
    ctx.restore();
    ctx.fillStyle = '#fff'; ctx.font = '700 13px Trebuchet MS, sans-serif';
    ctx.textAlign = 'center'; ctx.globalAlpha = 0.9;
    ctx.fillText('next: LEVEL ' + (level + 1) + ' in ' + Math.ceil(left) + 's', W / 2, 184);
    ctx.globalAlpha = 1;
  }

  // Brief "LEVEL X" announcement + speed-lines when a new level starts.
  function drawLevelUp() {
    const a = Math.min(1, levelUpFlash / 0.5);          // fade in/out
    const k = 1 - levelUpFlash / 1.6;                   // 0..1 progress
    ctx.save();
    ctx.globalAlpha = a * 0.5;
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    for (let i = 0; i < 6; i++) {                        // speed lines sweeping down
      const y = ((k * 900) + i * 130) % 900 - 60;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y + 40); ctx.stroke();
    }
    ctx.globalAlpha = a;
    ctx.translate(W / 2, 250);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffd34d'; ctx.lineWidth = 6; ctx.strokeStyle = 'rgba(0,0,0,.5)';
    ctx.font = '900 44px Trebuchet MS, sans-serif';
    ctx.strokeText('LEVEL ' + level, 0, 0); ctx.fillText('LEVEL ' + level, 0, 0);
    ctx.restore();
  }

  // 3 · 2 · 1 · GO! count-in before the first note lands.
  function drawCountIn(now) {
    const remain = spawnGate - now;
    const beatsLeft = remain / SPB;          // ~4 beats of lead-in
    const n = Math.ceil(beatsLeft - 0.0001);
    const label = n >= 4 ? 'GET READY' : (n <= 0 ? 'GO!' : String(n));
    const frac = beatsLeft - Math.floor(beatsLeft); // 1 -> 0 within the beat
    const pop = 1 + (1 - frac) * 0.6;
    ctx.save();
    ctx.translate(W / 2, 210);
    ctx.globalAlpha = Math.min(1, frac + 0.2);
    ctx.scale(pop, pop);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.lineWidth = 6; ctx.strokeStyle = 'rgba(0,0,0,.45)';
    ctx.fillStyle = n >= 4 ? '#fff' : '#ffd34d';
    ctx.font = (n >= 4 ? '900 30px' : '900 76px') + ' Trebuchet MS, sans-serif';
    ctx.strokeText(label, 0, 0); ctx.fillText(label, 0, 0);
    ctx.restore();
  }

  // Level-complete solo: notes stop so you can just watch him dance.
  function startBreak() {
    breakActive = true;
    breakEnd = AC.currentTime + 5.2;
    breakBeat = -1;
    notes = [];                    // clear the field
    shake = 0;
  }
  function endBreak() {
    breakActive = false;
    // the next, harder level begins
    level++;
    levelHits = 0;
    levelTarget += 2;              // a touch more to clear each level
    levelUpFlash = 1.6;            // "LEVEL X" announcement + speed-up flash
    // notes resume on their own and lead back in over TRAVEL.
  }

  // ============================ FLOW ======================================
  function startGame() {
    initAudio();
    document.getElementById('title').classList.add('hidden');
    document.getElementById('over').classList.add('hidden');
    notes = []; particles = []; rings = []; popups = []; spawnedSteps.clear();
    score = 0; combo = 0; maxCombo = 0; hype = 60; elapsed = 0; shake = 0; crowdHype = 0;
    dancer.pose = 0; dancer.energy = 0; dancer.pop = 0; dancer.flash = 0; lastNoteLane = -1;
    breakActive = false; breakBeat = -1;
    level = 1; levelHits = 0; levelTarget = 22; levelUpFlash = 0;
    state = 'playing';
    // start groove
    beatIndex = 0;
    audioStart = AC.currentTime + 0.12;
    nextNoteTime = audioStart;
    // notes hold for a 4-beat count-in, then stream in a full TRAVEL ahead
    spawnGate = audioStart + SPB * 4;
    noteStep = 0;
    noteTime = audioStart;
    if (musicTimer) clearInterval(musicTimer);
    musicTimer = setInterval(musicScheduler, 25);
    musicScheduler();
    generateNotes();
  }

  function gameOver() {
    if (state !== 'playing') return;
    state = 'over';
    if (musicTimer) { clearInterval(musicTimer); musicTimer = null; }
    // fade music
    if (musicGain) {
      const t = AC.currentTime;
      musicGain.gain.cancelScheduledValues(t);
      musicGain.gain.setValueAtTime(musicGain.gain.value, t);
      musicGain.gain.linearRampToValueAtTime(0.0001, t + 0.6);
      setTimeout(() => { if (musicGain) musicGain.gain.value = 0.85; }, 900);
    }
    const isBest = score > best;
    if (isBest) { best = score; localStorage.setItem('ppdo_best', best); }
    document.getElementById('finalScore').textContent = score.toLocaleString();
    document.getElementById('finalCombo').textContent = maxCombo;
    document.getElementById('finalBest').textContent = best;
    document.getElementById('titleBest').textContent = best;
    document.getElementById('newBest').classList.toggle('hidden', !isBest);
    document.getElementById('over').classList.remove('hidden');
  }

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('againBtn').addEventListener('click', startGame);

  // ---- Mute toggle ----
  const muteBtn = document.getElementById('muteBtn');
  function refreshMuteBtn() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
  refreshMuteBtn();
  muteBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    muted = !muted;
    localStorage.setItem('ppdo_muted', muted ? '1' : '0');
    if (master) master.gain.value = muted ? 0 : MASTER_VOL;
    refreshMuteBtn();
  });

  // ---- Share score ----
  const shareBtn = document.getElementById('shareBtn');
  shareBtn.addEventListener('click', async () => {
    const txt = `I scored ${score.toLocaleString()} (combo x${maxCombo}) in Pool Party Dance-Off! 🕺🔥 Can you out-dance me?`;
    const url = location.href.split('#')[0];
    try {
      if (navigator.share) {
        await navigator.share({ title: 'Pool Party Dance-Off', text: txt, url });
      } else {
        await navigator.clipboard.writeText(txt + ' ' + url);
        shareBtn.textContent = '✓ COPIED';
        setTimeout(() => { shareBtn.textContent = '↗ SHARE'; }, 1500);
      }
    } catch (_) { /* user dismissed share sheet — ignore */ }
  });

  // Optional autoplay (demo / self-test): open with #auto in the URL.
  if (location.hash === '#auto') {
    const autoLoop = () => {
      if (state === 'playing' && AC) {
        const now = AC.currentTime;
        for (const n of notes) {
          if (!n.judged && Math.abs(n.hitTime - now) <= 0.05) tapLane(n.lane);
        }
      }
      requestAnimationFrame(autoLoop);
    };
    requestAnimationFrame(autoLoop);
  }

  // Prevent iOS double-tap zoom / scroll bounce
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
})();
</script>
</body>
</html>
